<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">sensibile profile card</title>
  <desc id="desc">A static GitHub profile card describing sensibile's software focus and working style.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#143344"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="line" x1="96" y1="88" x2="808" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.5" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="36" y="35" width="828" height="214" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="280" rx="28" fill="url(#bg)"/>
  <path d="M84 82C194 20 293 122 410 70C528 18 610 46 704 86C779 118 835 91 870 64" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2"/>
  <path d="M31 220C137 169 253 192 360 221C493 258 594 223 704 177C776 147 838 159 896 195" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="60" y="52" width="780" height="176" rx="22" fill="#0B1220" fill-opacity="0.72" stroke="#FFFFFF" stroke-opacity="0.12"/>
  </g>

  <text x="96" y="105" fill="#ECFEFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="750" letter-spacing="0">
    sensibile
  </text>
  <rect x="96" y="126" width="712" height="3" rx="1.5" fill="url(#line)"/>

  <text x="96" y="162" fill="#CCFBF1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="500">
    Useful software, quiet interfaces, practical systems.
  </text>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="650">
    <rect x="96" y="184" width="132" height="30" rx="15" fill="#14B8A6" fill-opacity="0.18" stroke="#5EEAD4" stroke-opacity="0.38"/>
    <text x="116" y="204" fill="#D9FFF9">clarity</text>

    <rect x="244" y="184" width="136" height="30" rx="15" fill="#84CC16" fill-opacity="0.16" stroke="#BEF264" stroke-opacity="0.34"/>
    <text x="264" y="204" fill="#ECFCCB">shipping</text>

    <rect x="396" y="184" width="156" height="30" rx="15" fill="#38BDF8" fill-opacity="0.16" stroke="#7DD3FC" stroke-opacity="0.34"/>
    <text x="416" y="204" fill="#E0F2FE">developer UX</text>

    <rect x="568" y="184" width="160" height="30" rx="15" fill="#F8FAFC" fill-opacity="0.10" stroke="#CBD5E1" stroke-opacity="0.28"/>
    <text x="588" y="204" fill="#F8FAFC">maintainability</text>
  </g>
</svg>
